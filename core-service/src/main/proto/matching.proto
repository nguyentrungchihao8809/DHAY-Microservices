syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.duan.hday.grpc";

package matching;

// Dịch vụ AI Matching
service MatchingService {
  // Java gọi Python để lấy danh sách hành khách phù hợp cho một chuyến đi mới tạo
  rpc GetPotentialPassengers (MatchRequest) returns (MatchResponse);
}

// Cấu trúc tọa độ
message Coordinate {
  double lat = 1;
  double lng = 2;
}

// Yêu cầu từ phía Java Core gửi sang
message MatchRequest {
  int64 trip_id = 1;
  string route_polyline = 2;
  int32 available_seats = 3;
  Coordinate start_location = 4;
  Coordinate end_location = 5;
  string departure_time = 6; // Định dạng ISO 8601
}

// Thông tin một hành khách phù hợp do AI tìm được
message PassengerMatch {
  int64 request_id = 1;
  string passenger_name = 2;
  double match_score = 3;      // Độ khớp (0.0 đến 1.0)
  string reasoning = 4;        // Lý do AI chọn (ví dụ: "Nằm trên lộ trình 1.5km")
}

// Kết quả trả về cho Java
message MatchResponse {
  repeated PassengerMatch matches = 1; // Danh sách các khách hàng tìm thấy
}