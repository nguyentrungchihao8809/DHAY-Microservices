syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.duan.hday.grpc";
option java_outer_classname = "MatchingProto";

package matching;

service MatchingService {
    // 1. Đồng bộ yêu cầu của Khách hàng
    rpc SyncPassengerRequest (PassengerSyncRequest) returns (SyncResponse);
    
    // 2. Đồng bộ Chuyến đi của Tài xế (Dùng khi confirmRoute)
    rpc SyncDriverTrip (DriverTripSyncRequest) returns (SyncResponse);
    
    // 3. Lấy danh sách khách hàng tiềm năng cho tài xế
    rpc GetPotentialPassengers (MatchRequest) returns (MatchResponse);
}

// --- Các Message cho Passenger ---
message Coordinate {
    double lat = 1;
    double lng = 2;
}

message PassengerSyncRequest {
    int64 request_id = 1;
    string passenger_name = 2;
    Coordinate start_location = 3;
    Coordinate end_location = 4;
    string departure_time = 5;
    int32 seats_requested = 6;
}

// --- Các Message cho Driver Trip (Khớp với Trip.java) ---
message DriverTripSyncRequest {
    int64 trip_id = 1;
    string driver_name = 2;
    int32 available_seats = 3;
    string departure_time = 4;
    string route_polyline = 5; // Đây là cái dto.getPolyline() của bạn
    double distance_km = 6;
}

message SyncResponse {
    bool success = 1;
}

// --- Các Message cho Matching ---
message MatchRequest {
    int64 trip_id = 1;
    string route_polyline = 2;
    int32 available_seats = 3;
}

message MatchResponse {
    repeated PassengerMatch matches = 1;
}

message PassengerMatch {
    int64 request_id = 1;
    string passenger_name = 2;
    double match_score = 3;
    string reasoning = 4;
}